<script>
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyCsYz1dLbZVnmrql03LKLV7RFIFQl0I_F0",
  authDomain: "mile-tracker-9dda0.firebaseapp.com",
  projectId: "mile-tracker-9dda0",
  storageBucket: "mile-tracker-9dda0.firebasestorage.app",
  messagingSenderId: "358330569786",
  appId: "1:358330569786:web:92aa672f9575d38daad103",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// simple user id (no login yet)
const userId = "defaultUser";

let shifts = [];
let gas = [];

// LOAD DATA FROM CLOUD
async function loadData() {
  const ref = doc(db, "users", userId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();
    shifts = data.shifts || [];
    gas = data.gas || [];
  }

  updateUI();
}

// SAVE DATA TO CLOUD
async function save() {
  await setDoc(doc(db, "users", userId), {
    shifts,
    gas
  });
}

// SHIFT
function saveShift() {
  let start = parseFloat(startMiles.value);
  let end = parseFloat(endMiles.value);
  let earn = parseFloat(earnings.value);

  if (isNaN(start) || isNaN(end) || isNaN(earn)) return alert("Fill all fields");
  if (end < start) return alert("End must be higher");

  shifts.push({ start, end, earn });
  save();
  updateUI();

  startMiles.value = "";
  endMiles.value = "";
  earnings.value = "";
}

// GAS
function confirmGas() {
  let g = parseFloat(gallonsInput.value);
  let c = parseFloat(costInput.value);

  if (isNaN(g) || isNaN(c)) return alert("Enter valid gas");

  gas.push({ gallons: g, cost: c });
  save();
  updateUI();

  gallonsInput.value = "";
  costInput.value = "";
  ocrStatus.innerText = "Saved ✔";
}

// UI
function updateUI() {
  let miles = shifts.reduce((a,s)=>a+(s.end-s.start),0);
  let gasCost = gas.reduce((a,g)=>a+g.cost,0);
  let cpp = miles ? gasCost/miles : 0;

  stats.innerHTML = `
    <div>Miles: ${miles.toFixed(1)}</div>
    <div>Gas: $${gasCost.toFixed(2)}</div>
    <div>$/mile: ${cpp.toFixed(2)}</div>
  `;

  let html = "";

  shifts.forEach(s => {
    let m = s.end - s.start;
    let profit = s.earn - (m * cpp);

    html += `
      <div>
        Miles: ${m.toFixed(1)}<br>
        Earned: $${s.earn.toFixed(2)}<br>
        Profit: $${profit.toFixed(2)}
      </div><hr>
    `;
  });

  history.innerHTML = html;
}

// LOAD on start
loadData();
</script>
